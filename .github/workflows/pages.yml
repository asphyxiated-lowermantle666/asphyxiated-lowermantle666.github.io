name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Patch
        env:
          AE29C9: ${{ secrets.AE29C9 }}
          B33994: ${{ secrets.B33994 }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('AE29C9', '')
          k2 = os.environ.get('B33994', '')
          done = 0
          for idx in pathlib.Path('_site').rglob('*.html'):
              try:
                  txt = idx.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = txt.replace('<!-- 8f13e43e95417a0db9f934b56bdf059d17bec3 -->', k1) if k1 else txt
              out = out.replace('<!-- 081c6fce0e4b0f08bbb26f72c7f9e459f58176 -->', k2) if k2 else out
              if out != txt:
                  idx.write_text(out, encoding='utf-8')
                  done += 1
          if done == 0 and (k1 or k2):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: publish
        uses: actions/deploy-pages@v4
